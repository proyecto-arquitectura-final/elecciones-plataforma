name: elecciones-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: elecciones2026
      POSTGRES_USER: elecciones
      POSTGRES_PASSWORD: elecciones
    ports:
      - "5433:5432"
    volumes:
      - elecciones_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elecciones -d elecciones2026"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elecciones2026
      SPRING_DATASOURCE_USERNAME: elecciones
      SPRING_DATASOURCE_PASSWORD: elecciones
      APP_JWT_SECRET: local-elecciones-secret-change-me-32-characters
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
      APP_SEED_ENABLED: "true"
      APP_SEED_ADMIN_PASSWORD: admin1234
      APP_SEED_ANALYST_PASSWORD: analista1234
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_SITE_ADDRESS: :80
      ACME_EMAIL: local@example.com
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  elecciones_pg:
