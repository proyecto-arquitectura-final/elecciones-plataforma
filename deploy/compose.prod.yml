name: elecciones

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE no definido}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_PUBLIC_URL}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_SEED_ADMIN_NAME: ${APP_SEED_ADMIN_NAME:-Administrador}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD}
      APP_SEED_ANALYST_NAME: ${APP_SEED_ANALYST_NAME:-Analista Electoral}
      APP_SEED_ANALYST_EMAIL: ${APP_SEED_ANALYST_EMAIL}
      APP_SEED_ANALYST_PASSWORD: ${APP_SEED_ANALYST_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE no definido}
    restart: unless-stopped
    environment:
      APP_SITE_ADDRESS: ${APP_SITE_ADDRESS}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
