name: Componente · construir y desplegar
run-name: "${{ inputs.component }} · ${{ inputs.component_sha || 'main' }}"

on:
  workflow_dispatch:
    inputs:
      component:
        description: Componente que se va a construir y desplegar
        required: true
        type: choice
        options:
          - all
          - backend
          - commons
          - frontend
      component_sha:
        description: SHA exacto; vacío usa la rama main
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: elecciones-produccion
  cancel-in-progress: false

env:
  OWNER: proyecto-arquitectura-final
  PLATFORM_REPOSITORY: elecciones-plataforma
  BACK_REPOSITORY: back-elecciones
  COMMONS_REPOSITORY: commons
  FRONT_REPOSITORY: front-elecciones
  BACKEND_IMAGE_REPOSITORY: ghcr.io/proyecto-arquitectura-final/elecciones-backend
  FRONTEND_IMAGE_REPOSITORY: ghcr.io/proyecto-arquitectura-final/elecciones-frontend
  NODE_VERSION: '24.16.0'
  NPM_VERSION: '11.17.0'
  MOBILE_API_URL: 'https://elecciones-maf.online/api/v1'

jobs:
  prepare:
    name: Resolver versiones
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.resolve.outputs.component }}
      back_sha: ${{ steps.resolve.outputs.back_sha }}
      commons_sha: ${{ steps.resolve.outputs.commons_sha }}
      front_sha: ${{ steps.resolve.outputs.front_sha }}
      build_backend: ${{ steps.resolve.outputs.build_backend }}
      build_frontend: ${{ steps.resolve.outputs.build_frontend }}
    steps:
      - name: Descargar plataforma
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolver SHA de cada repositorio
        id: resolve
        shell: bash
        env:
          MANUAL_COMPONENT: ${{ inputs.component }}
          MANUAL_SHA: ${{ inputs.component_sha }}
        run: |
          set -Eeuo pipefail

          component="${MANUAL_COMPONENT:-}"
          requested_sha="${MANUAL_SHA:-}"

          case "$component" in
            all|backend|commons|frontend) ;;
            *) echo "Componente inválido: $component" >&2; exit 2 ;;
          esac

          pinned_sha() {
            local path="$1"
            git ls-tree HEAD "$path" | awk 'NR == 1 {print $3}'
          }

          main_sha() {
            local repository="$1"
            git ls-remote "https://github.com/${OWNER}/${repository}.git" refs/heads/main | awk 'NR == 1 {print $1}'
          }

          valid_sha() {
            [[ "$1" =~ ^[0-9a-fA-F]{40}$ ]]
          }

          back_sha="$(pinned_sha back || true)"
          commons_sha="$(pinned_sha commons || true)"
          front_sha="$(pinned_sha front || true)"

          valid_sha "$back_sha" || back_sha="$(main_sha "$BACK_REPOSITORY")"
          valid_sha "$commons_sha" || commons_sha="$(main_sha "$COMMONS_REPOSITORY")"
          valid_sha "$front_sha" || front_sha="$(main_sha "$FRONT_REPOSITORY")"

          case "$component" in
            backend)
              if valid_sha "$requested_sha"; then back_sha="$requested_sha"; else back_sha="$(main_sha "$BACK_REPOSITORY")"; fi
              build_backend=true
              build_frontend=false
              ;;
            commons)
              if valid_sha "$requested_sha"; then commons_sha="$requested_sha"; else commons_sha="$(main_sha "$COMMONS_REPOSITORY")"; fi
              build_backend=true
              build_frontend=false
              ;;
            frontend)
              if valid_sha "$requested_sha"; then front_sha="$requested_sha"; else front_sha="$(main_sha "$FRONT_REPOSITORY")"; fi
              build_backend=false
              build_frontend=true
              ;;
            all)
              back_sha="$(main_sha "$BACK_REPOSITORY")"
              commons_sha="$(main_sha "$COMMONS_REPOSITORY")"
              front_sha="$(main_sha "$FRONT_REPOSITORY")"
              build_backend=true
              build_frontend=true
              ;;
          esac

          for value in "$back_sha" "$commons_sha" "$front_sha"; do
            valid_sha "$value" || { echo "No se pudo resolver un SHA válido" >&2; exit 3; }
          done

          {
            echo "component=$component"
            echo "back_sha=$back_sha"
            echo "commons_sha=$commons_sha"
            echo "front_sha=$front_sha"
            echo "build_backend=$build_backend"
            echo "build_frontend=$build_frontend"
          } >> "$GITHUB_OUTPUT"

          echo "Componente: $component"
          echo "Back:      $back_sha"
          echo "Commons:   $commons_sha"
          echo "Front:     $front_sha"

  build-backend:
    name: Backend · pruebas, imagen y publicación
    needs: prepare
    if: ${{ needs.prepare.outputs.build_backend == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Descargar plataforma
        uses: actions/checkout@v6

      - name: Limpiar rutas de submódulos
        run: rm -rf back commons front

      - name: Descargar backend exacto
        uses: actions/checkout@v6
        with:
          repository: proyecto-arquitectura-final/back-elecciones
          ref: ${{ needs.prepare.outputs.back_sha }}
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}
          path: back
          persist-credentials: false

      - name: Descargar commons exacto
        uses: actions/checkout@v6
        with:
          repository: proyecto-arquitectura-final/commons
          ref: ${{ needs.prepare.outputs.commons_sha }}
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}
          path: commons
          persist-credentials: false

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: |
            pom.xml
            back/pom.xml
            commons/pom.xml

      - name: Compilar y ejecutar pruebas
        run: mvn -B -ntp -U -pl back -am clean verify

      - name: Definir etiqueta de imagen
        id: meta
        shell: bash
        env:
          BACK_SHA: ${{ needs.prepare.outputs.back_sha }}
          COMMONS_SHA: ${{ needs.prepare.outputs.commons_sha }}
        run: |
          image="${BACKEND_IMAGE_REPOSITORY}:back-${BACK_SHA:0:12}-commons-${COMMONS_SHA:0:12}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir y publicar backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.back_sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Frontend · pruebas, APK release, imagen y publicación
    needs: prepare
    if: ${{ needs.prepare.outputs.build_frontend == 'true' }}
    runs-on: ubuntu-24.04
    environment: production
    outputs:
      image: ${{ steps.meta.outputs.image }}
      apk_sha256: ${{ steps.apk_meta.outputs.sha256 }}
      apk_name: ${{ steps.apk_meta.outputs.name }}
    steps:
      - name: Descargar frontend exacto
        uses: actions/checkout@v6
        with:
          repository: proyecto-arquitectura-final/front-elecciones
          ref: ${{ needs.prepare.outputs.front_sha }}
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}
          path: front
          persist-credentials: false

      - name: Verificar proyecto Android versionado
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f front/android/gradlew || {
            echo "::error::El directorio android/ no está versionado en el repositorio frontend. Ejecuta npx cap add android, conserva los ajustes de firma y sube android/ a Git.";
            exit 2;
          }
          chmod +x front/android/gradlew

      - name: Configurar Node y npm
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Fijar npm y registry público
        shell: bash
        working-directory: front
        run: |
          set -Eeuo pipefail
          npm install --global "npm@${NPM_VERSION}"
          hash -r
          npm config set registry https://registry.npmjs.org/
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "Registry: $(npm config get registry)"
          test "$(npm --version)" = "${NPM_VERSION}"
          if grep -Rqs "applied-caas-gateway" package-lock.json .npmrc 2>/dev/null; then
            echo "::error::El frontend contiene referencias a un registry interno no accesible desde GitHub Actions."
            exit 3
          fi

      - name: Instalar dependencias
        working-directory: front
        run: npm ci --no-audit --no-fund

      - name: Ejecutar pruebas
        working-directory: front
        run: npm test -- --watch=false

      - name: Configurar Java 21 y caché Gradle
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            front/android/*.gradle
            front/android/**/*.gradle
            front/android/gradle/wrapper/gradle-wrapper.properties

      - name: Verificar Android SDK del runner
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "${ANDROID_HOME:-}" || { echo "ANDROID_HOME no está definido" >&2; exit 4; }
          test -d "$ANDROID_HOME/platforms/android-36" || sdkmanager "platforms;android-36"
          test -d "$ANDROID_HOME/build-tools/35.0.0" || sdkmanager "build-tools;35.0.0"
          java -version
          (cd front/android && ./gradlew -version)

      - name: Restaurar keystore de firma
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -Eeuo pipefail
          test -n "$KEYSTORE_BASE64" || {
            echo "::error::Falta el secret ANDROID_KEYSTORE_BASE64 en el environment production.";
            exit 5;
          }
          signing_dir="$RUNNER_TEMP/android-signing"
          keystore_path="$signing_dir/sistema-electoral-release.jks"
          install -m 700 -d "$signing_dir"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          test -s "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Generar APK release firmado para producción
        working-directory: front
        env:
          MOBILE_API_URL: ${{ env.MOBILE_API_URL }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
        run: |
          set -Eeuo pipefail
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          npm run android:release

      - name: Validar firma y preparar metadatos del APK
        id: apk_meta
        shell: bash
        working-directory: front
        run: |
          set -Eeuo pipefail
          apk="public/downloads/sistema-electoral.apk"
          test -s "$apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$apk"
          sha256="$(sha256sum "$apk" | awk '{print $1}')"
          size="$(stat -c '%s' "$apk")"
          echo "name=sistema-electoral.apk" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "APK SHA-256: $sha256"
          echo "APK bytes: $size"

      - name: Compilar web incluyendo el APK release
        working-directory: front
        run: |
          set -Eeuo pipefail
          npm run build:web
          test -s dist/srs-front/browser/downloads/sistema-electoral.apk
          cmp public/downloads/sistema-electoral.apk dist/srs-front/browser/downloads/sistema-electoral.apk

      - name: Conservar APK como artefacto del workflow
        uses: actions/upload-artifact@v4
        with:
          name: sistema-electoral-${{ needs.prepare.outputs.front_sha }}
          path: front/public/downloads/sistema-electoral.apk
          if-no-files-found: error
          retention-days: 30

      - name: Definir etiqueta de imagen
        id: meta
        shell: bash
        env:
          FRONT_SHA: ${{ needs.prepare.outputs.front_sha }}
        run: |
          image="${FRONTEND_IMAGE_REPOSITORY}:sha-${FRONT_SHA:0:12}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir y publicar frontend con el APK embebido
        uses: docker/build-push-action@v7
        with:
          context: front
          file: front/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.FRONTEND_IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.front_sha }}
            co.edu.elecciones.apk.sha256=${{ steps.apk_meta.outputs.sha256 }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-backend:
    name: Backend · desplegar en Lightsail
    needs: [prepare, build-backend]
    if: ${{ always() && needs.build-backend.result == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Descargar archivos de despliegue
        uses: actions/checkout@v6
        with:
          sparse-checkout: deploy

      - name: Configurar SSH
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copiar configuración al servidor
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh -i ~/.ssh/lightsail "$USER@$HOST" 'mkdir -p /opt/elecciones'
          scp -i ~/.ssh/lightsail \
            deploy/compose.prod.yml \
            deploy/deploy-component.sh \
            "$USER@$HOST:/opt/elecciones/"

      - name: Autenticar Lightsail en GHCR
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [[ -n "$GHCR_TOKEN" ]]; then
            printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/lightsail "$USER@$HOST" \
              "docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          else
            echo "Sin GHCR_READ_TOKEN: se asume que el paquete es público."
          fi

      - name: Desplegar únicamente backend
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          IMAGE: ${{ needs.build-backend.outputs.image }}
          PUBLIC_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          ssh -i ~/.ssh/lightsail "$USER@$HOST" \
            "chmod +x /opt/elecciones/deploy-component.sh && \
             /opt/elecciones/deploy-component.sh backend '$IMAGE' '$PUBLIC_URL'"

  deploy-frontend:
    name: Frontend · desplegar en Lightsail
    needs: [prepare, build-frontend, deploy-backend]
    if: >-
      ${{ always() &&
          needs.build-frontend.result == 'success' &&
          (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Descargar archivos de despliegue
        uses: actions/checkout@v6
        with:
          sparse-checkout: deploy

      - name: Configurar SSH
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copiar configuración al servidor
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh -i ~/.ssh/lightsail "$USER@$HOST" 'mkdir -p /opt/elecciones'
          scp -i ~/.ssh/lightsail \
            deploy/compose.prod.yml \
            deploy/deploy-component.sh \
            "$USER@$HOST:/opt/elecciones/"

      - name: Autenticar Lightsail en GHCR
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [[ -n "$GHCR_TOKEN" ]]; then
            printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/lightsail "$USER@$HOST" \
              "docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          else
            echo "Sin GHCR_READ_TOKEN: se asume que el paquete es público."
          fi

      - name: Desplegar únicamente frontend
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          IMAGE: ${{ needs.build-frontend.outputs.image }}
          PUBLIC_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          ssh -i ~/.ssh/lightsail "$USER@$HOST" \
            "chmod +x /opt/elecciones/deploy-component.sh && \
             /opt/elecciones/deploy-component.sh frontend '$IMAGE' '$PUBLIC_URL'"


      - name: Verificar que producción sirve exactamente el APK generado
        shell: bash
        env:
          PUBLIC_URL: ${{ secrets.PRODUCTION_URL }}
          EXPECTED_SHA256: ${{ needs.build-frontend.outputs.apk_sha256 }}
        run: |
          set -Eeuo pipefail
          apk_url="${PUBLIC_URL%/}/downloads/sistema-electoral.apk"
          tmp_apk="$RUNNER_TEMP/sistema-electoral-production.apk"
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location \
              --connect-timeout 10 --max-time 90 \
              "$apk_url" --output "$tmp_apk"; then
              actual_sha256="$(sha256sum "$tmp_apk" | awk '{print $1}')"
              if [[ "$actual_sha256" == "$EXPECTED_SHA256" ]]; then
                echo "APK productivo verificado: $apk_url"
                echo "SHA-256: $actual_sha256"
                exit 0
              fi
              echo "Intento $attempt: el servidor aún entrega el APK anterior ($actual_sha256)."
            else
              echo "Intento $attempt: el APK todavía no está disponible."
            fi
            sleep 10
          done
          echo "::error::El APK servido en producción no coincide con el generado por este workflow."
          exit 6

  record-version:
    name: Registrar SHA desplegado en submódulos
    needs: [prepare, deploy-backend, deploy-frontend]
    if: >-
      ${{ always() &&
          needs.prepare.result == 'success' &&
          ((needs.prepare.outputs.component == 'backend' && needs.deploy-backend.result == 'success') ||
           (needs.prepare.outputs.component == 'commons' && needs.deploy-backend.result == 'success') ||
           (needs.prepare.outputs.component == 'frontend' && needs.deploy-frontend.result == 'success') ||
           (needs.prepare.outputs.component == 'all' && needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar plataforma para actualizar gitlinks
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_WRITE_TOKEN || github.token }}

      - name: Actualizar referencias de submódulos
        shell: bash
        env:
          COMPONENT: ${{ needs.prepare.outputs.component }}
          BACK_SHA: ${{ needs.prepare.outputs.back_sha }}
          COMMONS_SHA: ${{ needs.prepare.outputs.commons_sha }}
          FRONT_SHA: ${{ needs.prepare.outputs.front_sha }}
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          case "$COMPONENT" in
            backend)  git update-index --add --cacheinfo 160000,"$BACK_SHA",back ;;
            commons)  git update-index --add --cacheinfo 160000,"$COMMONS_SHA",commons ;;
            frontend) git update-index --add --cacheinfo 160000,"$FRONT_SHA",front ;;
            all)
              git update-index --add --cacheinfo 160000,"$BACK_SHA",back
              git update-index --add --cacheinfo 160000,"$COMMONS_SHA",commons
              git update-index --add --cacheinfo 160000,"$FRONT_SHA",front
              ;;
          esac

          if git diff --cached --quiet; then
            echo "Las referencias ya estaban actualizadas."
            exit 0
          fi

          git commit -m "chore: registrar despliegue de $COMPONENT [skip ci]"
          if ! git push origin HEAD:main; then
            echo "::warning::El despliegue terminó, pero no se pudo actualizar el gitlink. Revisa protección de main o PLATFORM_WRITE_TOKEN."
          fi
